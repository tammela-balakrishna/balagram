services:
  - type: web
    name: balagram
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r instagram/requirements.txt && cd frontend2 && npm ci && npm run build && cd .. && python instagram/manage.py collectstatic --no-input
    preDeployCommand: python instagram/manage.py migrate
    startCommand: gunicorn instagram.wsgi:application --chdir instagram
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: balagram-db
          property: connectionString

databases:
  - name: balagram-db
    plan: free
    region: singapore
