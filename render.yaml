services:
  - type: web
    name: balagram
    runtime: python
    plan: free
    region: singapore

    buildCommand: |
      pip install -r instagram/requirements.txt
      cd frontend2
      npm ci
      npm run build
      cd ..
      python instagram/manage.py collectstatic --no-input

    preDeployCommand: python instagram/manage.py migrate

    startCommand: gunicorn instagram.wsgi:application --bind 0.0.0.0:$PORT --chdir instagram

    healthCheckPath: /

    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DJANGO_DEBUG
        value: "false"

      - key: DJANGO_ALLOWED_HOSTS
        value: balagram.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://balagram.onrender.com

      - key: CSRF_TRUSTED_ORIGINS
        value: https://balagram.onrender.com

      - key: DATABASE_URL
        fromDatabase:
          name: balagram-db
          property: connectionString


databases:
  - name: balagram-db
    plan: free
    region: singapore